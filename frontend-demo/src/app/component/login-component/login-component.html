<section class="login-shell">
  <div class="login-backdrop"></div>

  <div class="login-card">
    <div class="brand-block">
      <p class="eyebrow">Tonggaw Shop</p>
      <h1>Welcome back</h1>
      <p class="subtitle">
        Sign in to manage your orders, browse products, and continue your
        shopping journey.
      </p>
    </div>

    <form class="login-form" (submit)="login(); $event.preventDefault()">
      <label class="field">
        <span>Username</span>
        <input
          type="text"
          name="username"
          autocomplete="username"
          placeholder="Enter your username"
          [value]="getCredentials.username || ''"
          (input)="getCredentials.username = $any($event.target).value"
        />
      </label>

      <label class="field">
        <span>Password</span>
        <input
          type="password"
          name="password"
          autocomplete="current-password"
          placeholder="Enter your password"
          [value]="getCredentials.password || ''"
          (input)="getCredentials.password = $any($event.target).value"
        />
      </label>

      <button
        class="login-button"
        type="submit"
        [disabled]="!getCredentials.username || !getCredentials.password"
      >
        Sign In
      </button>
    </form>
  </div>
</section>
